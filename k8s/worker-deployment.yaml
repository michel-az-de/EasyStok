apiVersion: apps/v1
kind: Deployment
metadata:
  name: easystock-worker
  namespace: easystock
  labels:
    app: easystock-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: easystock-worker
  template:
    metadata:
      labels:
        app: easystock-worker
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: <ACR_NAME>.azurecr.io/easystock-worker:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: easystock-config
            - secretRef:
                name: easystock-secrets
          env:
            - name: Worker__NoMigrate
              value: "true"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "EasyStock.Worker.dll"]
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
