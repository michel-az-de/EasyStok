apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: easystock-api-hpa
  namespace: easystock
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: easystock-api
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
