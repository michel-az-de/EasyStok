# ─── ATENÇÃO: Este arquivo contém PLACEHOLDERS em base64 ─────────────────────
# Nunca commite valores reais aqui. Em produção, use Azure Key Vault ou
# kubectl create secret em pipelines CI/CD com as variáveis protegidas.
#
# Para gerar o base64 dos valores reais:
#   Linux/Mac : echo -n "valor-real" | base64
#   PowerShell: [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("valor-real"))
#
# Connection string Azure PostgreSQL:
#   echo -n "Host=pg-easystock.postgres.database.azure.com;Port=5432;Database=easystock;Username=adm_eabefe80;Password=RTNjezbZnmrI1S%*fCdC;SSL Mode=Require;Trust Server Certificate=true" | base64
#
# JWT Secret (gerar chave segura de 256 bits):
#   openssl rand -base64 32

apiVersion: v1
kind: Secret
metadata:
  name: easystock-secrets
  namespace: easystock
type: Opaque
data:
  # Substituir pelo base64 real da connection string Azure PostgreSQL
  ConnectionStrings__DefaultConnection: <BASE64_AZURE_POSTGRES_CONNECTION_STRING>

  # Substituir pelo base64 real de uma chave JWT segura (min 32 chars)
  Jwt__SecretKey: <BASE64_JWT_SECRET_KEY>
