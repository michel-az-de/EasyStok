apiVersion: apps/v1
kind: Deployment
metadata:
  name: easystock-api
  namespace: easystock
  labels:
    app: easystock-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: easystock-api
  template:
    metadata:
      labels:
        app: easystock-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: <ACR_NAME>.azurecr.io/easystock-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: easystock-config
            - secretRef:
                name: easystock-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /health/live
              port: 8080
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: uploads
              mountPath: /app/uploaded-files
      volumes:
        - name: uploads
          emptyDir: {}
