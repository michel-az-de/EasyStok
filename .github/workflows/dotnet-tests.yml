name: .NET tests

# Roda Unit Tests (Api + Application) e Integration Tests (PostgreSQL via
# Testcontainers) em todo PR/push que toca .NET ou os testes.
#
# Os Integration Tests do módulo Mobile (MobileOtaIntegrationTests) sobem
# Postgres real e exercitam o fluxo OTA do PWA end-to-end:
#   - GET /api/mobile/version → PwaVersionProvider lê CACHE_VERSION do sw.js
#   - Pareamento → comandos individuais → pull
#   - Broadcast pwa_update pra N devices
#   - Stress: 50 devices recebendo broadcast em <15s
#   - Concurrency: 10 broadcasts paralelos sem race condition

on:
  push:
    branches: [ master, main ]
    paths:
      - 'EasyStock.Api/**'
      - 'EasyStock.Application/**'
      - 'EasyStock.Domain/**'
      - 'EasyStock.Infra.Postgre/**'
      - 'EasyStock.Api.UnitTests/**'
      - 'EasyStock.Application.Tests/**'
      - 'EasyStock.Api.IntegrationTests/**'
      - '.github/workflows/dotnet-tests.yml'
  pull_request:
    paths:
      - 'EasyStock.Api/**'
      - 'EasyStock.Application/**'
      - 'EasyStock.Domain/**'
      - 'EasyStock.Infra.Postgre/**'
      - 'EasyStock.Api.UnitTests/**'
      - 'EasyStock.Application.Tests/**'
      - 'EasyStock.Api.IntegrationTests/**'
      - '.github/workflows/dotnet-tests.yml'
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore EasyStock.Api.UnitTests/EasyStock.Api.UnitTests.csproj
      - name: Test (Api UnitTests)
        run: dotnet test EasyStock.Api.UnitTests/EasyStock.Api.UnitTests.csproj
             -c Release --logger "trx;LogFileName=api-unit.trx" --logger "console;verbosity=normal"
      - name: Restore Application tests
        run: dotnet restore EasyStock.Application.Tests/EasyStock.Application.Tests.csproj
      - name: Test (Application)
        run: dotnet test EasyStock.Application.Tests/EasyStock.Application.Tests.csproj
             -c Release --logger "trx;LogFileName=application.trx" --logger "console;verbosity=normal"
      - name: Upload TRX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-unit-trx
          path: '**/TestResults/*.trx'

  integration:
    name: Integration tests (Postgres + TestServer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      # Docker já vem disponível em ubuntu-latest; Testcontainers usa o socket /var/run/docker.sock.
      - name: Restore
        run: dotnet restore EasyStock.Api.IntegrationTests/EasyStock.Api.IntegrationTests.csproj
      - name: Test (IntegrationTests)
        env:
          # Testcontainers precisa achar o daemon Docker padrão.
          TESTCONTAINERS_RYUK_DISABLED: 'false'
        run: dotnet test EasyStock.Api.IntegrationTests/EasyStock.Api.IntegrationTests.csproj
             -c Release --logger "trx;LogFileName=integration.trx" --logger "console;verbosity=normal"
      - name: Upload TRX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-integration-trx
          path: '**/TestResults/*.trx'
