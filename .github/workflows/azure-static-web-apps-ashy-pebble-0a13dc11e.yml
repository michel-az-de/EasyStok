name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # Inject config.js apontando o apiBaseUrl pra API em produção (Azure App Service).
      # A PWA serve da SWA mas faz fetch da API noutro origin — config.js diz pra onde ir.
      - name: Inject config.js (apiBaseUrl)
        run: |
          echo 'window.CDB_CONFIG = { apiBaseUrl: "https://easystock-api.azurewebsites.net" };' \
            > EasyStock.Api/wwwroot/pwa/config.js

      # Garante que index.html carrega config.js antes de sync.js (idempotente).
      - name: Wire config.js into index.html
        run: |
          if ! grep -q 'src="config.js"' EasyStock.Api/wwwroot/pwa/index.html; then
            sed -i 's|<script src="sync.js"></script>|<script src="config.js"></script>\n<script src="sync.js"></script>|' \
              EasyStock.Api/wwwroot/pwa/index.html
          fi

      # Cache busting: cada deploy substitui "cdb-v2" pelo SHA curto do commit.
      # Isso faz o SW antigo descartar caches velhos no activate.
      - name: Bump SW cache version
        run: |
          sed -i "s|cdb-v2|cdb-${GITHUB_SHA:0:7}|g" EasyStock.Api/wwwroot/pwa/sw.js

      # Carimba versao + release notes (primeira linha do commit) no
      # index.html. JS do app le window.__BUNDLE_INFO__ ao boot e mostra
      # modal "App atualizado!" quando deteta versao diferente da anterior.
      - name: Stamp version + release notes in index.html
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          python3 - <<'PY'
          import os, json
          version = "1.0." + os.environ["RUN_NUMBER"]
          msg = os.environ.get("COMMIT_MSG", "").strip()
          # Primeira linha = subject; usa ela como release notes resumida
          notes = msg.split("\n")[0].strip() or "Atualizacao"
          # Limita pra nao explodir o modal
          if len(notes) > 200:
              notes = notes[:197] + "..."
          notes_json = json.dumps(notes)
          path = "EasyStock.Api/wwwroot/pwa/index.html"
          with open(path, "r", encoding="utf-8") as f:
              html = f.read()
          html = html.replace("__APP_VERSION__", version)
          # Substitui o "__APP_RELEASE_NOTES__" entre aspas pelo JSON com
          # aspas — preserva sintaxe JS valida mesmo com chars especiais.
          html = html.replace('"__APP_RELEASE_NOTES__"', notes_json)
          with open(path, "w", encoding="utf-8") as f:
              f.write(html)
          print(f"[stamp] version={version}")
          print(f"[stamp] notes={notes}")
          PY

      # LiveUpdater: gera bundle-{version}.zip + updates.json dentro do
      # diretorio servido pelo SWA. APK Capacitor le updates.json, baixa
      # o ZIP, descompacta e troca o webDir mantendo origem http://localhost.
      # Versao usa run_number como patch pra ficar semver crescente.
      - name: Generate LiveUpdater bundle + updates.json
        run: |
          cd EasyStock.Api/wwwroot/pwa
          VERSION="1.0.${{ github.run_number }}"
          ZIPNAME="bundle-${VERSION}.zip"

          # ZIP de TUDO no diretorio (index.html ja na raiz — formato exigido pelo plugin)
          # Exclui o proprio zip do passo anterior caso re-execute, e .git stuff.
          zip -rq "/tmp/${ZIPNAME}" . -x "bundle-*.zip" "updates.json" "*.git*"
          mv "/tmp/${ZIPNAME}" "./${ZIPNAME}"

          CHECKSUM=$(sha256sum "${ZIPNAME}" | awk '{print $1}')
          BUNDLE_URL="https://ashy-pebble-0a13dc11e.7.azurestaticapps.net/${ZIPNAME}"

          cat > updates.json <<EOF
          {
            "version": "${VERSION}",
            "url": "${BUNDLE_URL}",
            "checksum": "${CHECKSUM}"
          }
          EOF

          echo "[LiveUpdater] versao=${VERSION} checksum=${CHECKSUM}"
          echo "[LiveUpdater] url=${BUNDLE_URL}"
          ls -la bundle-*.zip updates.json

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_PEBBLE_0A13DC11E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "./EasyStock.Api/wwwroot/pwa" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "" # vazio: app_location já é a pasta final estática (sem build step)
          skip_app_build: true
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_PEBBLE_0A13DC11E }}
          action: "close"
