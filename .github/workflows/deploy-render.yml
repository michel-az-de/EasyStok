name: Deploy to Render (master)

# Pipeline oficial de produção.
#
# Etapas:
#   1. build + testes .NET
#   2. reescreve CACHE_VERSION nos sw.js (PWA e snapshot do APK) com o SHA
#   3. gera APK release assinado e copia para EasyStock.Web/wwwroot/downloads/
#   4. commita o APK no master (permite que o service Web sirva o binário)
#   5. exige aprovação manual no GitHub Environment "production"
#   6. dispara deploy hooks dos 4 services Render (api / web / admin / worker)
#   7. health-check final
#
# Render também tem auto-deploy ligado em master (render.yaml), então os
# deploy hooks aqui servem como "trigger explícito + ordem garantida":
# API primeiro, depois Web/Admin/Worker.

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.x'

permissions:
  contents: write   # precisa commitar APK em wwwroot/downloads/

jobs:
  build-test:
    name: Build + Tests
    runs-on: ubuntu-latest
    outputs:
      sha-short: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - id: sha
        run: echo "short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Rewrite CACHE_VERSION
        shell: pwsh
        run: ./scripts/rewrite-cache-version.ps1 -Sha "${{ github.sha }}"

      - name: Restore + Build
        run: |
          dotnet restore
          dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Upload rewritten sw.js
        uses: actions/upload-artifact@v4
        with:
          name: pwa-sw
          path: |
            EasyStock.Api/wwwroot/pwa/sw.js
            casa-da-baba-mobile/apk/web/sw.js
          if-no-files-found: warn
          retention-days: 1

  build-apk:
    name: Build + Sign APK
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 platforms;android-35 build-tools;34.0.0 platform-tools'

      - name: Rewrite CACHE_VERSION
        shell: pwsh
        run: ./scripts/rewrite-cache-version.ps1 -Sha "${{ github.sha }}"

      - name: Install Capacitor deps
        working-directory: casa-da-baba-mobile/apk
        run: npm install --no-audit --no-fund

      - name: Copy PWA + inject API URL (Render)
        working-directory: casa-da-baba-mobile/apk
        run: node scripts/copy-web.js "https://easystok-api.onrender.com"

      - name: Capacitor sync
        working-directory: casa-da-baba-mobile/apk
        run: npx cap sync android

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          set +x
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_B64 não configurado"
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: casa-da-baba-mobile/apk/android
        env:
          BUILD_VERSION_CODE: ${{ github.run_number }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
        run: |
          set +x
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS"

      - name: Verify APK signature
        run: |
          set +x
          APK="casa-da-baba-mobile/apk/android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK" ]; then
            echo "::error::APK não gerado em $APK"
            exit 1
          fi
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs "$APK" > /tmp/apk-certs.txt
          grep -q "Signer #1 certificate" /tmp/apk-certs.txt || (echo "::error::Assinatura APK inválida"; exit 1)
          echo "APK signature verified OK"

      - name: Stage APK in EasyStock.Web/wwwroot/downloads/
        run: |
          mkdir -p EasyStock.Web/wwwroot/downloads
          SHA="${{ needs.build-test.outputs.sha-short }}"
          SRC="casa-da-baba-mobile/apk/android/app/build/outputs/apk/release/app-release.apk"
          cp "$SRC" "EasyStock.Web/wwwroot/downloads/easystok-$SHA.apk"
          cp "$SRC" "EasyStock.Web/wwwroot/downloads/easystok-latest.apk"
          SIZE=$(stat -c%s "$SRC")
          cat > EasyStock.Web/wwwroot/downloads/apk-version.json <<JSON
          {
            "sha": "$SHA",
            "version": "1.0.${{ github.run_number }}",
            "releasedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "sizeBytes": $SIZE,
            "fileName": "easystok-$SHA.apk",
            "latestUrl": "/downloads/easystok-latest.apk"
          }
          JSON

      - name: Commit APK to master
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci(apk): build ${{ needs.build-test.outputs.sha-short }} [skip ci]"
          file_pattern: |
            EasyStock.Web/wwwroot/downloads/easystok-*.apk
            EasyStock.Web/wwwroot/downloads/apk-version.json
            EasyStock.Api/wwwroot/pwa/sw.js
            casa-da-baba-mobile/apk/web/sw.js

  promote:
    name: Promote to Render (requires approval)
    runs-on: ubuntu-latest
    needs: [build-test, build-apk]
    environment: production    # GitHub Environment com required reviewers
    steps:
      - name: Trigger Render API deploy
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

      - name: Wait API health
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://easystok-api.onrender.com/health || echo 000)
            echo "attempt $i: $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          echo "::error::API health não atingiu 200 em 5min"
          exit 1

      - name: Trigger Render Web/Admin/Worker
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WEB }}"
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_ADMIN }}"
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WORKER }}"

      - name: Smoke test Web (PWA + /downloads)
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://easystok-web.onrender.com/health || echo 000)
            echo "web attempt $i: $STATUS"
            [ "$STATUS" = "200" ] && break
            sleep 10
          done
          curl -fsSL https://easystok-web.onrender.com/downloads/apk/version | tee /tmp/apk-ver.json
          curl -fsSI https://easystok-web.onrender.com/downloads/apk | head -5
