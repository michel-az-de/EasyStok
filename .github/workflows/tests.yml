name: Tests + Coverage

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  DOTNET_VERSION: '9.x'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  # Fase 1: thresholds baseline. Sobem em Fase 2 conforme adicionamos testes
  # nos paths criticos (Pix, Webhook, Faturas, Subscription).
  COVERAGE_LINE_THRESHOLD: '10'
  COVERAGE_BRANCH_THRESHOLD: '5'

jobs:
  test:
    name: Test + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore EasyStok.sln

      - name: Build (Release)
        run: dotnet build EasyStok.sln -c Release --no-restore

      # Cada projeto roda em step proprio pra que falha em um nao mascare os outros.
      # `continue-on-error: true` so nos integration tests porque dependem de Docker;
      # se Docker falhar no runner, tests com `if (!_isAvailable) return;` ja viram no-ops.

      - name: Domain.Tests
        run: >-
          dotnet test EasyStock.Domain.Tests/EasyStock.Domain.Tests.csproj
          -c Release --no-build
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings
          --logger "trx;LogFileName=Domain.trx"
          --results-directory ./TestResults/Domain

      - name: Application.Tests
        run: >-
          dotnet test EasyStock.Application.Tests/EasyStock.Application.Tests.csproj
          -c Release --no-build
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings
          --logger "trx;LogFileName=Application.trx"
          --results-directory ./TestResults/Application

      - name: ArchitectureTests
        run: >-
          dotnet test EasyStock.ArchitectureTests/EasyStock.ArchitectureTests.csproj
          -c Release --no-build
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings
          --logger "trx;LogFileName=Architecture.trx"
          --results-directory ./TestResults/Architecture

      - name: Api.UnitTests
        run: >-
          dotnet test EasyStock.Api.UnitTests/EasyStock.Api.UnitTests.csproj
          -c Release --no-build
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings
          --logger "trx;LogFileName=ApiUnit.trx"
          --results-directory ./TestResults/ApiUnit

      - name: Api.IntegrationTests (Testcontainers Postgres)
        run: >-
          dotnet test EasyStock.Api.IntegrationTests/EasyStock.Api.IntegrationTests.csproj
          -c Release --no-build
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings
          --logger "trx;LogFileName=ApiIntegration.trx"
          --results-directory ./TestResults/ApiIntegration

      - name: Infra.Postgre.IntegrationTests (Testcontainers Postgres)
        run: >-
          dotnet test EasyStock.Infra.Postgre.IntegrationTests/EasyStock.Infra.Postgre.IntegrationTests.csproj
          -c Release --no-build
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings
          --logger "trx;LogFileName=InfraPostgre.trx"
          --results-directory ./TestResults/InfraPostgre

      - name: Install ReportGenerator
        if: always()
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate aggregated coverage report
        if: always()
        run: |
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:"./TestResults/CoverageReport" \
            -reporttypes:"HtmlInline_AzurePipelines;Cobertura;MarkdownSummaryGithub;TextSummary;Badges" \
            -classfilters:"-System.*;-Microsoft.*"

      - name: Job summary
        if: always()
        run: |
          if [ -f ./TestResults/CoverageReport/SummaryGithub.md ]; then
            cat ./TestResults/CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f ./TestResults/CoverageReport/Summary.txt ]; then
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '<details><summary>Text summary</summary>' >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat ./TestResults/CoverageReport/Summary.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo '</details>' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: ./TestResults/CoverageReport
          retention-days: 14

      - name: Upload TRX results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trx-results
          path: ./TestResults/**/*.trx
          retention-days: 14

      - name: Publish test report (TRX)
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: xUnit Tests
          path: ./TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Sticky PR comment with coverage summary
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: ./TestResults/CoverageReport/SummaryGithub.md

      - name: Coverage gate (fail if below baseline)
        if: always()
        run: |
          set -euo pipefail
          REPORT="./TestResults/CoverageReport/Cobertura.xml"
          if [ ! -f "$REPORT" ]; then
            echo "::warning::Cobertura report not found at $REPORT — pulando gate."
            exit 0
          fi
          # Extrai line-rate e branch-rate do XML agregado
          LINE_RATE=$(python3 -c "
          import xml.etree.ElementTree as ET
          r = ET.parse('$REPORT').getroot()
          print(round(float(r.attrib.get('line-rate', '0')) * 100, 2))
          ")
          BRANCH_RATE=$(python3 -c "
          import xml.etree.ElementTree as ET
          r = ET.parse('$REPORT').getroot()
          print(round(float(r.attrib.get('branch-rate', '0')) * 100, 2))
          ")
          echo "Line coverage:   ${LINE_RATE}% (threshold: ${COVERAGE_LINE_THRESHOLD}%)"
          echo "Branch coverage: ${BRANCH_RATE}% (threshold: ${COVERAGE_BRANCH_THRESHOLD}%)"
          # Gate: falha se linha < threshold OU branch < threshold
          FAIL=0
          if python3 -c "import sys; sys.exit(0 if float('$LINE_RATE') < float('$COVERAGE_LINE_THRESHOLD') else 1)"; then
            echo "::error::Line coverage ${LINE_RATE}% abaixo do threshold ${COVERAGE_LINE_THRESHOLD}%"
            FAIL=1
          fi
          if python3 -c "import sys; sys.exit(0 if float('$BRANCH_RATE') < float('$COVERAGE_BRANCH_THRESHOLD') else 1)"; then
            echo "::error::Branch coverage ${BRANCH_RATE}% abaixo do threshold ${COVERAGE_BRANCH_THRESHOLD}%"
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "Coverage gate ok."
