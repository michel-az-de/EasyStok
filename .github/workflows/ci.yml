name: CI

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main ]

env:
  DOTNET_VERSION: '9.x'

jobs:
  # ── Build + unit tests ──────────────────────────────────────────────────────
  build-and-unit-tests:
    name: Build + Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore EasyStok.sln

      - name: Build (Release)
        run: dotnet build EasyStok.sln -c Release --no-restore --nologo

      - name: Unit tests
        run: |
          dotnet test EasyStock.Api.UnitTests/EasyStock.Api.UnitTests.csproj -c Release --no-build --nologo --logger "console;verbosity=normal"
          dotnet test EasyStock.Application.Tests/EasyStock.Application.Tests.csproj -c Release --no-build --nologo --logger "console;verbosity=normal"
          dotnet test EasyStock.Domain.Tests/EasyStock.Domain.Tests.csproj -c Release --no-build --nologo --logger "console;verbosity=normal"

  # ── Seed flow integration tests (Testcontainers Postgres) ───────────────────
  # R6: gateia merge contra regressao em migrations + seed em DB do zero +
  # idempotencia 3x. Custo ~30s por run (container postgres + factory startup).
  seed-flow-integration-tests:
    name: Seed flow integration tests (R6)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore EasyStok.sln

      - name: Build (Release)
        run: dotnet build EasyStok.sln -c Release --no-restore --nologo

      - name: Run SeedFlow integration tests
        run: |
          dotnet test EasyStock.Api.IntegrationTests/EasyStock.Api.IntegrationTests.csproj \
            -c Release --no-build --nologo \
            --filter "FullyQualifiedName~SeedFlowIntegrationTests" \
            --logger "console;verbosity=normal"
