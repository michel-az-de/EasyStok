name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -p:UseSharedCompilation=false

    - name: Run tests
      run: dotnet test --no-build --verbosity normal -p:UseSharedCompilation=false
      env:
        ConnectionStrings__DefaultConnection: ${{ secrets.AZURE_PG_CONNECTION_STRING }}
        Database__Provider: PostgreSQL

    - name: Run benchmarks
      run: dotnet run --project EasyStock.Benchmarks --configuration Release
