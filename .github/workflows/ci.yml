name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -p:UseSharedCompilation=false

    - name: Run tests
      run: dotnet test --no-build --verbosity normal -p:UseSharedCompilation=false
      env:
        ConnectionStrings__DefaultConnection: Host=localhost;Database=easystock_test;Username=postgres;Password=postgres

    - name: Run benchmarks
      run: dotnet run --project EasyStock.Benchmarks --configuration Release