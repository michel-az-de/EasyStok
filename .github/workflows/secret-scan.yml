name: secret-scan

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # full history para o gitleaks varrer commits passados, não só o HEAD.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Sem licença: roda em modo OSS (sem upload pra dashboard).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_ENABLE_SUMMARY: true

      - name: Fail on known leaked tokens (defense in depth)
        # Mesmo se o gitleaks falhe a detecção, varre por strings conhecidas que já
        # vazaram pra esse repo. Atualizar a lista quando novos tokens forem rotacionados.
        run: |
          set -e
          patterns=(
            "EasyStock-Dev-SuperSecretKey-Min32Chars"
            "cdb-dev-key-change-in-production-2026"
            "RTNjezbZnmrI1S"
          )
          rc=0
          for p in "${patterns[@]}"; do
            if grep -RIn --exclude-dir=.git --exclude-dir=node_modules --exclude="*.lock" --exclude="secret-scan.yml" -- "$p" .; then
              echo "::error::known leaked secret pattern found: $p"
              rc=1
            fi
          done
          exit $rc
