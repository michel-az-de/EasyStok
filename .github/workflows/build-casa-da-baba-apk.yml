name: Build Casa da Baba APK

# Gera o APK do PWA Casa da Baba em CI, como alternativa para ambientes
# Windows corporativos onde o Gradle falha com "Unable to establish loopback
# connection" (firewall / antivirus bloqueando sockets locais).
#
# Como usar:
#  1. Push na branch master que toca em casa-da-baba-mobile/apk/** ou
#     EasyStock.Api/wwwroot/pwa/** → workflow roda sozinho.
#  2. Ou dispare manualmente: Actions → "Build Casa da Baba APK" → Run workflow.
#  3. Baixe o APK assinado de debug em Artifacts (válido por 7 dias).
#
# O APK sai configurado com API_BASE_URL vazia — o app chama a mesma origem
# que serve o PWA. Para apontar para um backend remoto (ex.: EasyStock deployado),
# setar a variável de repositório API_BASE_URL ou passar via workflow_dispatch.

on:
  push:
    branches: [ master, main ]
    paths:
      - 'casa-da-baba-mobile/apk/**'
      - 'EasyStock.Api/wwwroot/pwa/**'
      - '.github/workflows/build-casa-da-baba-apk.yml'
  workflow_dispatch:
    inputs:
      apiBaseUrl:
        description: 'URL base da API EasyStock (ex: https://easystock.exemplo.com). Vazio = mesmo host que serve o PWA.'
        required: false
        default: ''

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        # Sem cache: package-lock.json não é versionado (está no .gitignore)
        # e npm install do Capacitor é rápido (~10s).

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # SDK 35 e necessario por causa de androidx.work:work-runtime:2.10
          # puxado pelo @capgo/capacitor-updater. SDK 34 mantido como target.
          packages: 'platforms;android-34 platforms;android-35 build-tools;34.0.0 platform-tools'

      - name: Install Capacitor deps
        working-directory: casa-da-baba-mobile/apk
        run: npm install --no-audit --no-fund

      - name: Copy PWA + inject config
        working-directory: casa-da-baba-mobile/apk
        run: node scripts/copy-web.js "${{ github.event.inputs.apiBaseUrl || vars.API_BASE_URL || '' }}"

      - name: Capacitor sync
        working-directory: casa-da-baba-mobile/apk
        run: npx cap sync android

      - name: Build APK (debug)
        working-directory: casa-da-baba-mobile/apk/android
        env:
          # versionCode crescente — garante que Android aceita a atualização
          # sem desinstalar. run_number = contador monotônico do workflow.
          BUILD_VERSION_CODE: ${{ github.run_number }}
        # gradlew foi commitado do Windows; marca executável antes de rodar.
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: casa-da-baba-debug-apk
          path: casa-da-baba-mobile/apk/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error
