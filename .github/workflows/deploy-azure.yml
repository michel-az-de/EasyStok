name: Deploy to Azure App Service

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.x'

jobs:
  # ── 1. Build & deploy API ────────────────────────────────────────────────────
  deploy-api:
    name: API → Azure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & Publish API
        run: |
          dotnet restore EasyStock.Api/EasyStock.Api.csproj
          dotnet publish EasyStock.Api/EasyStock.Api.csproj \
            -c Release -o ./publish-api --no-restore

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: easystock-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish-api

  # ── 2. Run DB migrations ─────────────────────────────────────────────────────
  # NOTA: GitHub Actions bloqueia `secrets.X` em condicional `if:` (security
  # feature — evita timing leak). Em vez de skip via `if`, deixamos o job
  # sempre rodar e o step verifica a env var localmente.
  migrate:
    name: DB migrations
    runs-on: ubuntu-latest
    needs: deploy-api
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Build Infra.Postgre + Api (necessario pra dotnet ef sem --no-build)
        run: |
          dotnet build EasyStock.Infra.Postgre/EasyStock.Infra.Postgre.csproj -c Release --nologo
          dotnet build EasyStock.Api/EasyStock.Api.csproj -c Release --no-restore --nologo

      - name: Generate idempotent migration SQL (audit trail no GITHUB_STEP_SUMMARY)
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}
          Database__Provider: PostgreSql
        run: |
          if [ -z "$ConnectionStrings__DefaultConnection" ]; then
            echo "::notice::DB_CONNECTION_STRING ausente — pulando migrations (somente staging/dev sem secret)."
            exit 0
          fi
          dotnet ef migrations script --idempotent \
            --project EasyStock.Infra.Postgre \
            --startup-project EasyStock.Api \
            --no-build \
            --output migrations.sql
          echo "## Migration SQL aplicado neste deploy" >> "$GITHUB_STEP_SUMMARY"
          echo '```sql' >> "$GITHUB_STEP_SUMMARY"
          head -c 50000 migrations.sql >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run migrations (FAIL-LOUD se erro — R6)
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}
          Database__Provider: PostgreSql
        run: |
          if [ -z "$ConnectionStrings__DefaultConnection" ]; then
            echo "::notice::DB_CONNECTION_STRING ausente — pulando migrations."
            exit 0
          fi
          # R6: removido `|| true` — falha de migration agora derruba o pipeline.
          # Retry 3x com backoff exponencial pra absorver glitch transitorio (network/Azure cold start).
          for attempt in 1 2 3; do
            if dotnet ef database update \
                --project EasyStock.Infra.Postgre \
                --startup-project EasyStock.Api \
                --no-build; then
              echo "Migration OK (tentativa $attempt)."
              exit 0
            fi
            sleep_secs=$((10 * attempt * attempt))
            echo "::warning::Migration falhou (tentativa $attempt/3) — retry em ${sleep_secs}s"
            sleep $sleep_secs
          done
          echo "::error::Migration falhou apos 3 tentativas — abortando deploy."
          exit 1

  # ── 3. Build & deploy Admin ──────────────────────────────────────────────────
  deploy-admin:
    name: Admin → Azure
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & Publish Admin
        run: |
          dotnet restore EasyStock.Admin/EasyStock.Admin.csproj
          dotnet publish EasyStock.Admin/EasyStock.Admin.csproj \
            -c Release -o ./publish-admin --no-restore

      - name: Deploy Admin to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: easystock-admin
          publish-profile: ${{ secrets.AZURE_ADMIN_PUBLISH_PROFILE }}
          package: ./publish-admin

  # ── 4. Build & deploy Web ────────────────────────────────────────────────────
  deploy-web:
    name: Web → Azure
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & Publish Web
        run: |
          dotnet restore EasyStock.Web/EasyStock.Web.csproj
          dotnet publish EasyStock.Web/EasyStock.Web.csproj \
            -c Release -o ./publish-web --no-restore

      - name: Deploy Web to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: easystock-web
          publish-profile: ${{ secrets.AZURE_WEB_PUBLISH_PROFILE }}
          package: ./publish-web

  # ── 4. Health check ──────────────────────────────────────────────────────────
  # R6: depende de `migrate` agora (nao so dos deploys). Se migration falhou,
  # health check nao roda. Retorno != 200 derruba o pipeline (era warning antes).
  health-check:
    name: Health check
    runs-on: ubuntu-latest
    needs: [ deploy-api, deploy-web, deploy-admin, migrate ]
    timeout-minutes: 8
    steps:
      - name: Wait for warm-up (30s)
        run: sleep 30

      - name: Ping API /health/ready (FAIL-LOUD com retry — R6)
        run: |
          URL="https://easystock-api-dfdjgsfwaqhkgvf9.brazilsouth-01.azurewebsites.net/health/ready"
          for attempt in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" --max-time 30)
            echo "API /health/ready tentativa $attempt: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "API ready — OK."
              exit 0
            fi
            sleep 50
          done
          echo "::error::API /health/ready nao respondeu 200 apos 6 tentativas (5min). Abortando."
          exit 1

      - name: Ping API /health (sanity)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://easystock-api-dfdjgsfwaqhkgvf9.brazilsouth-01.azurewebsites.net/health \
            --max-time 30 --retry 3 --retry-delay 10)
          echo "API /health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::API /health retornou $STATUS"
            exit 1
          fi

      - name: Ping Web /health (FAIL-LOUD com retry — R6)
        run: |
          URL="https://easystock-web-awg6gpdfancpc0ep.brazilsouth-01.azurewebsites.net/health"
          for attempt in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" --max-time 30)
            echo "Web /health tentativa $attempt: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Web OK."
              exit 0
            fi
            sleep 50
          done
          echo "::error::Web /health nao respondeu 200 apos 6 tentativas (5min). Abortando."
          exit 1
