name: Deploy to Azure App Service

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.x'

jobs:
  build-and-deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & Publish API
        run: |
          dotnet restore EasyStock.Api/EasyStock.Api.csproj
          dotnet publish EasyStock.Api/EasyStock.Api.csproj -c Release -o ./publish-api --no-restore

      - name: Deploy API to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: easystock-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish-api

  build-and-deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & Publish Web
        run: |
          dotnet restore EasyStock.Web/EasyStock.Web.csproj
          dotnet publish EasyStock.Web/EasyStock.Web.csproj -c Release -o ./publish-web --no-restore

      - name: Deploy Web to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: easystock-web
          publish-profile: ${{ secrets.AZURE_WEB_PUBLISH_PROFILE }}
          package: ./publish-web
