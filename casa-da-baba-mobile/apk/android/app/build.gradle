apply plugin: 'com.android.application'

// versionCode dinâmico — garante crescimento MONOTONICO entre builds locais
// e do CI. Usa o MAIOR valor entre run_number e timestamp:
//  - Build local: usa timestamp em minutos desde 21/12/2025 (cresce 1440/dia,
//    cabe em int 32-bit por 1500+ anos).
//  - Build CI: github.run_number e pequeno (dezenas), entao Math.max(run,
//    timestamp) sempre cai no timestamp — crescente independente da ordem
//    em que builds rodam.
//
// IMPORTANTE: se em algum momento alguem buildou local primeiro (versionCode
// virou um numero alto tipo 186000+) e DEPOIS o CI buildou com BUILD_VERSION_CODE
// pequeno (run_number<100), Android bloqueia o update in-place com mensagem
// "pacote parece ser invalido" — porque entende como downgrade. Esse Math.max
// resolve definitivamente.
def dynamicVersionCode = {
    def base = ((System.currentTimeMillis() / 60000) - 29437920).toInteger()
    def envRun = System.getenv("BUILD_VERSION_CODE")
    if (envRun != null && envRun.toString().isInteger()) {
        return Math.max(envRun.toInteger(), base)
    }
    return base
}()

android {
    namespace "com.casadababa.app"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.casadababa.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode dynamicVersionCode
        versionName "1." + dynamicVersionCode
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    // Keystore FIXO versionado (cdb-debug.keystore) — garante que todas as
    // APKs geradas (local, CI, qualquer máquina) tenham a MESMA assinatura.
    // Sem isso, o Android recusa a atualização (conflito de assinatura) e
    // o usuário teria que desinstalar, perdendo o localStorage.
    signingConfigs {
        debug {
            storeFile file('cdb-debug.keystore')
            storePassword 'android'
            keyAlias 'cdb-debug'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug  // reusar o mesmo em debug-release (não é play-store)
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
