<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>EasyStok — Portal do Cliente</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="portal.js"></script>
<script>
  // Entry point: se autenticado, vai para faturas; senao, login.
  (function () {
    if (window.EasyStokPortal && window.EasyStokPortal.getToken()) {
      location.replace('/portal/faturas.html');
    } else {
      location.replace('/portal/login.html');
    }
  })();
</script>
</head>
<body></body>
</html>
