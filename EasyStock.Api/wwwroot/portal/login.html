<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Entrar — EasyStok Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="portal.css">
<script defer src="portal.js"></script>
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <svg width="36" height="36" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <path d="M32 6 L56 18 L32 30 L8 18 Z" fill="#E85814"/>
        <path d="M8 18 L32 30 L32 58 L8 46 Z" fill="#0E2A6E"/>
        <path d="M56 18 L32 30 L32 58 L56 46 Z" fill="#06143A"/>
      </svg>
      <div>
        <h1 style="margin:0">Entrar</h1>
        <div class="subtitle">Acesse suas faturas</div>
      </div>
    </div>

    <div id="alert-box"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-input" required autocomplete="email" autofocus />
      </div>
      <div class="form-group">
        <label class="form-label" for="senha">Senha</label>
        <input type="password" id="senha" class="form-input" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Entrar</button>
    </form>

    <p style="text-align:center;font-size:12px;color:var(--ink-mute);margin-top:18px;margin-bottom:0">
      Acesso exclusivo para clientes EasyStok.
    </p>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const form = document.getElementById('loginForm');
    const alertBox = document.getElementById('alert-box');
    const btn = document.getElementById('submitBtn');

    // Se ja tem token, redireciona
    if (window.EasyStokPortal.getToken()) {
      location.replace('/portal/faturas.html');
      return;
    }

    function showError(msg) {
      alertBox.innerHTML = '<div class="alert alert-error">' + window.EasyStokPortal.ui.escapeHtml(msg) + '</div>';
    }
    function clearError() {
      alertBox.innerHTML = '';
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      clearError();
      btn.disabled = true;
      btn.textContent = 'Entrando…';

      try {
        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('senha').value;
        await window.EasyStokPortal.login(email, senha);
        location.replace('/portal/faturas.html');
      } catch (err) {
        showError(err.message || 'Falha ao entrar.');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  });
</script>
</body>
</html>
