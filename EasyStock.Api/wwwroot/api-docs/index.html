<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>EasyStock · Console</title>
    <meta name="description" content="EasyStock API Console — interface dark futurista pra explorar e testar endpoints.">
    <meta name="theme-color" content="#0b0908">
    <meta name="color-scheme" content="dark light">
    <link rel="icon" href="/pwa/icons/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="./css/tokens.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/animations.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/console.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.0/dist/purify.min.js" defer></script>
</head>
<body data-stage="boot">
    <div id="es-scanlines" aria-hidden="true"></div>
    <main id="root">
        <div class="es-loading" role="status" aria-live="polite">
            <div class="es-spinner" aria-hidden="true">[<span class="es-spinner-bar"></span>]</div>
            <span class="es-loading-text">Inicializando console…</span>
        </div>
    </main>
    <div id="es-toast" role="status" aria-live="polite" aria-atomic="true"></div>
    <script type="module" src="./js/app.js"></script>
</body>
</html>
