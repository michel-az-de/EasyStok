outcome: |
  Entrega combinada de 3 artefatos de visibilidade publica:

  1. ROADMAP.md (raiz, 154 linhas): visao publica do roadmap por etapa,
     estabilizacao continua (stability-roadmap), marcos de longo prazo
     (NF-e, marketplaces), como acompanhar, links pra 21 ADRs e planos.

  2. docs/CHANGELOG.md (274 linhas): formato Keep a Changelog adaptado para
     Conventional Commits squashed. 158 PRs agrupados por mes (2026-05
     dominante: 153 PRs; 2026-04 minoritario) com highlights, listagem
     feat/fix/perf/test/arch/refactor/chore/ci/docs por tipo, eventos de
     infra/decisao (sem PR) em tabela cronologica.

  3. docs/FEATURES.md (391 linhas): mapa publico por modulo de negocio
     (22 modulos) com status (Pronto/Parcial/Planejado/Diferido). Aponta
     pra .knowledge/current-state.md para detalhes tecnicos (single source
     of truth interna). Cobre: Auth, Multi-tenant, Catalogo, Pedido,
     Compras, Caixa (V1+V2 deferred), Financeiro, Billing, Pagamentos,
     NF-e, Rotulagem (Etapa 5), Etiquetas, Notificacoes, Helpdesk, Mobile,
     KDS, IA, Admin, Auditoria/LGPD, Onboarding, Webhooks, Infra.

  Gap observado durante execucao: scripts/tasks/claim.sh depende de bash 5+
  e python3 (UTC isoformat). Em Windows nativo nao roda direto — replicado
  manualmente em PowerShell. Sugestao: portar pra script PowerShell paralelo
  OU documentar dependencia (WSL ou Git Bash + Python).

