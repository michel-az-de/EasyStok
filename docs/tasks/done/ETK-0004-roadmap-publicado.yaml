context: |
  Hoje ROADMAP esta so no CLAUDE.md (privado pra agentes). Felipe quer ROADMAP.md publico na raiz mostrando proximas N entregas pra stakeholders externos.

  ESCOPO EXPANDIDO (com aprovacao do Felipe nesta sessao 2026-05-24): entrega
  combinada de 3 artefatos de visibilidade publica como umbrella desta task:
  ROADMAP.md + docs/CHANGELOG.md + docs/FEATURES.md. Justificativa: coesos
  (visao de futuro/presente/passado), doc-only, baixo risco, menos churn de PRs.

acceptance_criteria:
  - "ROADMAP.md na raiz do repo - FEITO"
  - "Lista proximas 3-5 entregas com estimativa - FEITO (Etapas 1-5+)"
  - "Linka pros ADRs e planos - FEITO"
  - "docs/CHANGELOG.md com 158 PRs squashed agrupados por mes - FEITO (escopo expandido)"
  - "docs/FEATURES.md com mapa por modulo de negocio - FEITO (escopo expandido, 22 modulos)"
  - "Nao duplicar .knowledge/ - FEITO (FEATURES aponta pra current-state.md)"

