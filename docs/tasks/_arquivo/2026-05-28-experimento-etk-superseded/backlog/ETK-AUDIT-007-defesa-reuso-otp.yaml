context: |
  GOLDEN-PATHS.md GP-003 critério: "Tentar com OTP errado 5x bloqueia
  temporariamente. OTP expira em 5min e retorna 410 Gone."

  Auditoria Fase 1 (2026-05-27) verificou ValidarOtpUseCase
  (EasyStock.Application/UseCases/Storefront/Auth/ValidarOtpUseCase.cs):
  - Tentativas 5x: ✓ (RegistrarTentativa + OtpTentativasExcedidasException)
  - Expiração 5min: ✓ (Expirou + OtpExpiradoException)
  - Consumir após sucesso: ✓ (linha 136)

  Gap menor: a entity ClienteOtp.Consumir() marca consumido, mas o
  repository GetAtivoPorTelefoneHashAsync filtra por status — se o
  filter falhar (bug futuro), o mesmo OTP poderia ser reaproveitado.
  Defesa em profundidade: validar explicitamente `!Consumido` no use
  case antes de tentar.

  É P2 porque depende da camada de repositório falhar — risco baixo.
  Mas defense-in-depth tem custo trivial.

files_to_modify:
  - "EasyStock.Application/UseCases/Storefront/Auth/ValidarOtpUseCase.cs (adicionar guard explícito !otp.Consumido)"

acceptance_criteria:
  - "ValidarOtpUseCase rejeita explicitamente OTP com Consumido=true (não apenas confia no repository filter)"
  - "Teste: invocar ValidarOtp duas vezes com mesmo OTP correto - 2ª retorna OtpInvalidoException ou similar"

