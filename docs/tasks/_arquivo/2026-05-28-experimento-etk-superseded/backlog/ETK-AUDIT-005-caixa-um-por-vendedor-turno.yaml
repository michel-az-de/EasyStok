context: |
  GOLDEN-PATHS.md GP-019 critério: "Tentar abrir 2 caixas para mesmo
  vendedor → bloqueia. Outro vendedor pode abrir seu próprio caixa em
  paralelo."

  Auditoria Fase 1 (2026-05-27) verificou AbrirCaixaUseCase
  (EasyStock.Application/UseCases/AbrirCaixa/AbrirCaixaUseCase.cs):
  - Checa se há fechamento do dia (GetFechamentoDoDiaAsync)
  - NÃO checa se o vendedor atual já tem caixa aberto naquele turno

  Falta:
  - Conceito de "turno" (manhã/tarde/noite, ou simplesmente Caixa aberto
    sem fechamento ainda)
  - Validação por (usuário, loja, sem fechamento) — pode ser simples:
    rejeitar segunda abertura se existe MovimentoCaixa tipo='abertura'
    sem MovimentoCaixa tipo='fechamento' correspondente, para o mesmo
    usuárioId+lojaId
  - Constraint UNIQUE em DB para defesa em profundidade

  Não bloqueia GP-019 inteiro — só permite estado inconsistente que
  usuário precavido evita.

