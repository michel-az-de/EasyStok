blocks: []

context: |
  GOLDEN-PATHS.md GP-029 critério: "Cliente vê status atualizado em tempo
  real (SSE ou polling)". Auditoria Fase 1 (2026-05-27) confirmou que não
  há endpoint SSE para status de pedido no storefront, nem cliente
  implementado.

  Cliente PWA storefront precisa saber quando pedido transitou de
  AguardandoAprovacao → Aprovado → EmPreparo → Pronto → Entregue.
  Sem isso, cliente precisa recarregar a página manualmente.

  Decisão de implementação: SSE (Server-Sent Events) prefere a WebSocket
  porque é unidirecional (servidor → cliente), atrás de proxies/CDN, e
  combina bem com domain events que já existem.

  Alternativa: polling agressivo (5s) com cabeçalho If-None-Match. Menos
  eficiente mas mais simples se infraestrutura não suportar SSE em fly.io.

  Não é P0 porque o cliente sobrevive recarregando a página, mas degrada
  UX seriamente em pedidos em preparo.

