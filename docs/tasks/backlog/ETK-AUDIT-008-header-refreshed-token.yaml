context: |
  GOLDEN-PATHS.md GP-004 critério: "Header X-Refreshed-Token presente
  na resposta."

  Auditoria Fase 1 (2026-05-27) verificou TokenRefreshHandler
  (EasyStock.Web/Services/TokenRefreshHandler.cs):
  - Refresh transparente ao cliente: ✓ (detecta 401 → refresh → retry)
  - Mas NÃO seta header X-Refreshed-Token na resposta

  Cliente Web funciona porque o token vai em Session (server-side), não
  via header. A spec do GP-004 espera o header para outros consumidores
  (JS client, mobile MAUI, parceiros).

  Decisão: ou (a) implementar o header, ou (b) revisar a spec do GP-004
  para refletir que refresh é transparente via Session em MVC e via
  header só em REST.

files_to_modify:
