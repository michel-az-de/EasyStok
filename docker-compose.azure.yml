# docker-compose.azure.yml — stack completa do EasyStok numa VM unica (Azure).
# Sobe Web + Admin + API + Postgres + Caddy (HTTPS automatico) num so host.
# Postgres roda em container (volume persistente) => zero custo de banco gerenciado.
#
# Uso na VM:
#   cp .env.azure.example .env   # e preencher hosts (sslip.io) + senhas
#   docker compose -f docker-compose.azure.yml up -d --build
#
# Variaveis sensiveis vem do arquivo .env (NAO commitar o .env real — so o .example).
#
# Nota healthcheck: as imagens aspnet:9.0 NAO trazem wget/curl (o HEALTHCHECK dos
# Dockerfiles usa wget e falha aqui — no Fly nao importa pois o Fly usa health
# check proprio). Por isso sobrescrevemos o healthcheck via bash + /dev/tcp.

networks:
  easystock-net:
    driver: bridge

volumes:
  postgres-data:
  uploads-data:
  caddy-data:
  caddy-config:
  dataprotection-web-keys:
  dataprotection-admin-keys:

services:

  # ── PostgreSQL (dados persistem no volume postgres-data) ──────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: easystok-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [easystock-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API (.NET 9) — aplica migrations + seeds no startup ──────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: easystok-api:latest
    container_name: easystok-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__Provider: PostgreSql
      # Sem passo de migrate separado (ao contrario do Render/Fly que rodam
      # --migrate-only antes): a propria API aplica migrations + seeds no startup.
      # Seguro com 1 replica (serializado via advisory lock no Postgres).
      RunMigrationsOnStartup: "true"
      MigrationsFailFast: "true"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};SSL Mode=Disable"
      Jwt__Issuer: ${Jwt__Issuer:-EasyStock}
      Jwt__Audience: ${Jwt__Audience:-EasyStock}
      Jwt__SecretKey: ${Jwt__SecretKey}
      Jwt__ExpirationMinutes: "60"
      Anthropic__Enabled: "false"
      FileStorage__Provider: Local
      # URL publica absoluta da API para compor os links dos arquivos. Sem isso a URL
      # salva e relativa (/files/...) e a imagem quebra na Web/Admin (outra origem, que
      # nao serve /files). ${API_HOST} vem do .env (api.<ip>.sslip.io), igual ao web.
      FileStorage__PublicBaseUrl: "https://${API_HOST}/files"
      # SuperAdmin do painel /admin — obrigatorio em Production (fail-fast se ausente).
      SEED_SUPERADMIN_EMAIL: ${SEED_SUPERADMIN_EMAIL}
      SEED_SUPERADMIN_PASSWORD: ${SEED_SUPERADMIN_PASSWORD}
      SEED_SUPERADMIN_NOME: ${SEED_SUPERADMIN_NOME:-Super Admin}
      # Seed de dados demo (PastaBella/Cantina/CasaDaBaba) — opt-in via .env; default off.
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      SEED_DEMO_VOLUME: ${SEED_DEMO_VOLUME:-small}
    volumes:
      - uploads-data:/app/uploaded-files
    networks: [easystock-net]
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ── Web (MVC) — consome a API pela rede interna do compose ───────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.Web
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    image: easystok-web:latest
    container_name: easystok-web
    restart: unless-stopped
    depends_on: [api]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ApiSettings__BaseUrl: "http://api:8080/api"
      ApiSettings__TimeoutSeconds: "30"
      # URL PUBLICA da API (browser) p/ o link do KDS/PWA no _Sidebar (BUG-13).
      # ${API_HOST} vem do .env (api.<ip>.sslip.io). NAO confundir com ApiSettings__BaseUrl
      # (interno, http://api:8080, usado nas chamadas server-side da Web).
      PublicApiUrl: "https://${API_HOST}"
      # Persistencia das chaves de DataProtection num volume — sem isso o cookie de
      # auth morre a cada deploy (logout geral). Ver EasyStock.Web/Program.cs (8b).
      DataProtection__KeysPath: /app/dataprotection-keys
    volumes:
      - dataprotection-web-keys:/app/dataprotection-keys
    networks: [easystock-net]
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8081"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── Admin (Razor Pages) — consome a API pela rede interna ────────────────────
  admin:
    build:
      context: .
      dockerfile: Dockerfile.cloudrun.admin
    image: easystok-admin:latest
    container_name: easystok-admin
    restart: unless-stopped
    depends_on: [api]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ApiBaseUrl: "http://api:8080"
      EasyStockWebUrl: "https://${APP_HOST}"
      # Persistencia das chaves de DataProtection num volume (mesma motivacao do web).
      # O AdminSessionRestoreMiddleware restaura a sessao via cookie _rt_admin; o DP
      # persistido evita churn de antiforgery/cookie de sessao a cada deploy. O Admin
      # roda como root no Dockerfile.cloudrun.admin, entao o volume e gravavel sem chown.
      DataProtection__KeysPath: /app/dataprotection-keys
    volumes:
      - dataprotection-admin-keys:/app/dataprotection-keys
    networks: [easystock-net]
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── Storefront casadababa.com (site estatico Vite -> nginx) ──────────────────
  # Imagem buildada a parte na VM (contexto fora deste repo):
  #   docker build -t casadababa-storefront:latest /home/azureuser/casa-da-baba
  storefront:
    image: casadababa-storefront:latest
    container_name: easystok-storefront
    restart: unless-stopped
    networks: [easystock-net]

  # ── Caddy — reverse proxy + HTTPS automatico (Let's Encrypt) ─────────────────
  # Roteia cada hostname (sslip.io) para o servico interno correspondente.
  caddy:
    image: caddy:2-alpine
    container_name: easystok-caddy
    restart: unless-stopped
    depends_on: [web, admin, api]
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_HOST: ${APP_HOST}
      ADMIN_HOST: ${ADMIN_HOST}
      API_HOST: ${API_HOST}
      CASA_HOST: ${CASA_HOST}
      CASADABABA_HOST: ${CASADABABA_HOST}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [easystock-net]
