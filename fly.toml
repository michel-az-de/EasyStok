# Fly.io config para o serviço API EasyStok.
# Substituto do Render `easystok` enquanto o billing nao reseta.
# Gerado em 2026-05-12. Postgres continua no Render (External URL).
#
# Como deployar (uma vez instalado o fly CLI + autenticado):
#   cd C:\rep\EasyStok
#   fly secrets set ... (env vars sensiveis)
#   fly deploy
#
# Secrets sao setadas com `fly secrets set` — nao colocar valores aqui
# (este arquivo vai pro git).

app = "easystok"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Storage local de arquivos persistente. Sem [mounts] o filesystem do container e
# efemero: cada `fly deploy` apaga os uploads (bug "arquivo some depois"). O volume
# precisa ser criado UMA vez antes do proximo deploy:
#   fly volumes create uploaded_files --size 3 --region iad -a easystok
[mounts]
  source = "uploaded_files"
  destination = "/app/uploaded-files"

[env]
  # URL publica absoluta da API para compor os links dos arquivos (estrategia B): a
  # imagem e exibida na Web/Admin (outra origem) e precisa apontar pra API, nao pro
  # proprio host. Equivalente ao FileStorage__PublicBaseUrl da VM (docker-compose).
  FileStorage__PublicBaseUrl = "https://easystok.fly.dev/files"

# Antes de promover a versao nova, o Fly roda as migrations numa maquina
# temporaria (entrypoint recebe --migrate-only → app migra e encerra). Se a
# migration falhar, o deploy e abortado e a versao antiga continua servindo —
# producao nunca fica com codigo novo + banco velho.
[deploy]
  release_command = "--migrate-only"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"     # nao deixar dormir (free tier permite 24/7 com 3 vms)
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"  # 512mb cobre uma API .NET 9 razoavelmente, ainda no free tier
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    path = "/health/live"
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
