# Fly.io config para o site operacional EasyStok Web.
# Substituto do Render `easystok-web`. Consome a API que esta no Fly.

app = "easystok-web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.Web"

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Sem health check HTTP (mesmo motivo do admin: redirect pra login).
