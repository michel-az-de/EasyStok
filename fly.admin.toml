# Fly.io config para o serviço Admin EasyStok.
# Substituto do Render `easystok-admin`. Consome a API que esta no Fly tambem.

app = "easystok-admin"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.cloudrun.admin"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Sem health check HTTP — admin redireciona / pra login (302) e
# o Fly considera 302 como falha. TCP default basta (porta aberta = ok).
