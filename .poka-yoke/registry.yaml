# Manifesto poka-yoke do EasyStok -- fonte unica legivel por maquina.
# Definido em ADR-0029. Cada entrada e um guard rail ou um alvo de guard rail.
# Mantido vivo: ampliar com evidencia medida (PS1). NAO editar sem atualizar o ADR.
version: 1
adr: docs/adr/0029-camada-poka-yoke-frugalidade-tokens.md
updated: "2026-06-27"

# Arquivos gerados/copiados em build: editar a copia e sempre-erro (a fonte manda).
# severity block = hook PreToolUse nega Edit/Write (Fatia 4).
generated_files:
  - id: etiqueta-web-copy
    path: EasyStock.Web/wwwroot/etiqueta/**
    source: EasyStock.Api/wwwroot/pwa/etiqueta
    mechanism: "msbuild target CopyEtiquetaAssets (EasyStock.Web/EasyStock.Web.csproj, BeforeTargets=Build)"
    severity: block
    evidence: "#527: commit saiu com 4 de 6 arquivos (a copia foi revertida pelo build)"
  - id: etiqueta-mobile-mirror
    path: EasyStok.Mobile/Resources/Raw/pwa/**
    source: EasyStock.Api/wwwroot/pwa/**
    mechanism: "manual-mirror (sem target MSBuild); gate CI dual-frontend-drift.yml"
    severity: block
    status_ci: GREEN  # Fatia 4 sincronizou os 3 arquivos divergentes (2026-06-08)
  - id: tailwind-web
    path: EasyStock.Web/wwwroot/css/tailwind.dist.css
    source: "tailwind.config.js + Views/**/*.cshtml + wwwroot/js/**/*.js"
    mechanism: "msbuild target TailwindBuild (EasyStock.Web/EasyStock.Web.csproj, BeforeTargets=BeforeBuild)"
    severity: block
  - id: tailwind-admin
    path: EasyStock.Admin/wwwroot/css/tailwind.dist.css
    source: "tailwind.config.js + Pages/**/*.cshtml + wwwroot/js/**/*.js"
    mechanism: "msbuild target TailwindBuild (EasyStock.Admin/EasyStock.Admin.csproj, BeforeTargets=BeforeBuild)"
    severity: block

# Constantes do Domain espelhadas a mao no Web (BFF HTTP puro, sem ProjectReference).
# severity warn = nao bloqueia, lembra de atualizar a fonte canonica junto.
mirrored_constants:
  - web: "EasyStock.Web/Models/ViewModels/Configuracoes/ConfiguracoesViewModel.cs:5-8"
    source: "EasyStock.Domain/Defaults/OperacionalDefaults.cs"
    severity: warn
  - web: "EasyStock.Web/Services/EstoqueService.cs:85"
    source: "EasyStock.Domain/Defaults/OperacionalDefaults.cs (DiasVencimentoProximo=7)"
    severity: warn
    note: "este ja tem comentario-espelho em EstoqueService.cs:78-80"

# Comandos canonicos. Qualquer agente invoca sem redescobrir.
canonical_commands:
  build-check:
    cmd: 'powershell -File scripts/poka-yoke/build-check.ps1'
    raw: 'dotnet build EasyStok.CI.slnf --nologo -p:UseAppHost=false -o $TEMP/easystok-build-check'
    why: "slnf pula Mobile (sem maui); -o (dir temporario) + UseAppHost=false evitam o lock de bin do ambiente local (#448). Substitui o build da sln cheia do passo 0 do CLAUDE.md. Provado verde com Admin/Web ativos (1m01s, 0 erros)."
    status: active
  arch-gate:
    cmd: 'dotnet test EasyStock.ArchitectureTests/EasyStock.ArchitectureTests.csproj --filter "Category=Architecture"'
    why: "gate R4 de arquitetura (o mesmo que o Husky pre-commit roda). 12 testes Category=Architecture, nao a suite inteira."
    status: active
  commit-seguro:
    cmd: 'scripts/poka-yoke/commit-seguro.ps1'
    why: "stage por pathspec, diff cached, build-check, commit, valida HEAD (autor/arquivos/closes). Anti-race do auto-commit #448."
    status: active
  deploy-verify:
    cmd: 'scripts/poka-yoke/deploy-verify.ps1'
    why: "az vm run-command + docker inspect GIT_SHA==HEAD nos 3 containers (web/api/admin, #572). Verificacao sem HTTP (TLS bare-IP nao funciona)."
    status: active
  worktree-status:
    cmd: 'powershell -File scripts/poka-yoke/worktree-status.ps1'
    why: "inventario seguro de git worktrees (branch/merjado/dirty/atual); marca candidatos a remover SEM apagar a sessao atual nem o principal. O harness cria/remove worktree por sessao."
    status: active

# Armadilhas conhecidas e seu detector. status active = detector existe; planned = sera criado.
traps:
  - id: alpine-dropdown-display-none
    class: E
    desc: "x-show + .app-dropdown{display:none} persistente mata os dropdowns; usar [x-cloak] para anti-flash"
    fix_in_code: "EasyStock.Web/wwwroot/css/app.css:165 ([x-cloak]); aviso em Views/Shared/_Layout.cshtml:46-50"
    detector: "EasyStock.ArchitectureTests (teste estatico anti-regressao)"
    status: active
    evidence: "regrediu 5x: #103, #479, shas 531fcaa9 e79a0576 8c4d4a60"
  - id: formtaghelper-eats-submit-prevent
    class: E
    desc: "<form> (FormTagHelper) descarta @submit.prevent no render; modais submetem nativo"
    fix_in_code: "EasyStock.Web/wwwroot/js/form-modal.js:121-124 (listener programatico)"
    detector: "teste estatico: form-modal.js mantem o listener de submit"
    status: active
    evidence: "#481"
  - id: xmodel-programmatic-fill
    class: E
    desc: "x-model so atualiza em input/change; valor setado por autofill/automacao nao dispara"
    fix_in_code: "form-modal.js:207-213 e Produtos/Form.cshtml:1214-1222 (dispatchEvent input/change)"
    detector: "teste estatico: o dispatchEvent existe"
    status: active
    evidence: "#497 commit 941d7821"
  # Armadilhas Alpine do Admin (issue #705). O AlpineHygieneTests so lia o Web (ReadWebFile);
  # cada um destes JA derrubou o Admin em producao e nao tinha guard estatico. Detector:
  # EasyStock.ArchitectureTests/AdminAlpineHygieneTests (Category=Architecture, no gate do Husky).
  - id: admin-alpine-script-order
    class: E
    desc: "core Alpine (vendor/alpine/alpine.js) carregado ANTES das factories window.es* (admin-components.js) -> 'esTabs is not defined', /Configuracoes inerte"
    fix_in_code: "EasyStock.Admin/Pages/_Layout.cshtml (core por ultimo, L46; aviso L33-40)"
    detector: "AdminAlpineHygieneTests.CoreAlpine_DeveCarregarDepoisDasFactories"
    status: active
    evidence: "#469, sha 56953688; issue #705"
  - id: admin-alpine-double-init
    class: E
    desc: "<body x-data='adminApp()'> com x-init='init()' redundante (Alpine v3 auto-invoca init()) -> polling/fetch dobrado em TODA rota (esta no layout)"
    fix_in_code: "EasyStock.Admin/Pages/_Layout.cshtml:57 (body sem x-init)"
    detector: "AdminAlpineHygieneTests.Body_NaoDeveTerXInitRedundante"
    status: active
    evidence: "BUG-003 #463, sha f1fe49d9; issue #705"
  - id: admin-alpine-xfor-key-null
    class: E
    desc: "x-for :key sem fallback no command palette -> grupo.titulo:null vira key objeto -> 'x-for key cannot be an object'"
    fix_in_code: "EasyStock.Admin/Pages/Shared/Components/_CommandPalette.cshtml:98 (:key grupo.titulo || 'resultados')"
    detector: "AdminAlpineHygieneTests.CommandPalette_XForKey_DeveTerFallback"
    status: active
    evidence: "BUG-011 #463, sha 2b9345d6; issue #705"
  - id: admin-alpine-sri-cdn
    class: E
    desc: "<script> de Alpine com integrity= (SRI) ou cdn.jsdelivr.net -> SRI quebrado + CDN bloqueado mata o Alpine SEM logar no console"
    fix_in_code: "EasyStock.Admin/Pages/_Layout.cshtml (self-hosted ~/js/vendor/alpine/, sem integrity)"
    detector: "AdminAlpineHygieneTests.Alpine_DeveSerSelfHosted_SemSriNemCdn"
    status: active
    evidence: "incidente 2026-06-02 (docs/dev/incidentes/2026-06-02-alpine-sri-firewall-interatividade-morta.md); issue #705"
  - id: generated-copy-edit
    class: A
    desc: "editar a copia gerada em vez da fonte; revertido no proximo build"
    detector: "hook PreToolUse deny (pretooluse-block-generated.ps1) + .gitattributes linguist-generated + gate dual-frontend-drift (mirror Mobile)"
    status: active
  - id: autocommit-hijack
    class: B
    desc: "ambiente local #448 auto-commita o working tree, varre staged, autor/mensagem errados, closes #N nao dispara"
    detector: "commit-seguro (commit por pathspec) + hook PostToolUse valida HEAD"
    status: active
    evidence: "#448, 627157d3"
  - id: bin-lock-build
    class: D
    desc: "dotnet watch do ambiente local trava apphost.exe; build da sln cheia falha MSB3021"
    detector: "build-check (UseAppHost=false)"
    status: planned  # Fatia 2
  - id: ci-chronic-red
    class: D
    desc: "coverage/deploy-render/dual-frontend-drift vermelhos sempre; red deixa de significar problema"
    detector: "quarentena: Render off, coverage non-required, drift consertado"
    status: planned  # Fatia 2
  - id: migration-sem-designer
    class: G
    desc: "migration .cs sem .Designer.cs e invisivel ao EF (0 pendentes), DDL nunca roda"
    detector: "EasyStock.ArchitectureTests MigrationDesignerHygieneTests"
    status: active  # ADR-0024, ja no gate
    evidence: "#290, #464, #465, ADR-0024"
  - id: deploy-manual-esquecido
    class: F
    desc: "deploy manual da VM esquecido deixa prod em commit antigo; verify por HTTP nao funciona (TLS bare-IP)"
    detector: "deploy-verify (GIT_SHA do container == HEAD)"
    status: active
    evidence: "#494"
  - id: worktree-vs-mainrepo
    class: C
    desc: "confusao worktree vs repo principal (tools defaultam p/ worktree stale); harness cria worktree por sessao -> o passo 0 disparava PARAR falso; risco de apagar worktree de sessao ativa"
    detector: "worktree-status.ps1 (inventario seguro, exclui atual/principal) + passo 0 do CLAUDE.md reconciliado (worktrees do harness esperados)"
    status: active
    evidence: "9 worktrees nesta sessao; Glob defaultou p/ o worktree stale 01949b2e"

# Gates de CI e o que cada um realmente cobre (medido 2026-06-08 via gh run list).
ci_gates:
  green_real:
    - ci.yml          # build EasyStok.CI.slnf + test (exclui ArchitectureDebt). Gate de merge.
    - secret-scan.yml # gitleaks. Gate.
    - deploy-fly.yml  # deploy prod Fly (API/Web/Admin + health). Gate de deploy.
  quarantined:        # Fatia 2: tirados do gatilho por-commit (eram vermelho cronico = ruido)
    - coverage.yml      # gatilho -> schedule + workflow_dispatch (era FAIL em todo commit)
    - deploy-render.yml # gatilho -> workflow_dispatch (Render suspenso + build maui quebrado)
  red_remaining: []   # vazio: dual-frontend-drift verdejado na Fatia 4 (mirror Mobile sincronizado, drift 0)
